<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            position: relative;
            overflow: hidden;
        }
        .box1{
            background-image: url(../新建文件夹/2025-08-08_16.13.32.png);
            height: 300px;
            width: 300px;
        }
         .box .img{
            position: absolute;
            height: 30px;
            width: 30px;
            background-image: url("C:\\Users\\whb\\Downloads\\新对话.png");
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(15);
            opacity: 0;
            transition: all 0.5s;

        .box:hover .img{
            opacity: 1;
            transform: translate(-50%,-50%) scale(1);

</head>
<body>

        <div class="box1"></div>
