<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: all 1s;/*空间缩放等空间属性必须对3维盒子起作用
            ，不能对二维平面添加此属性*/
        }
        .box1{
            height: 300px;
            width: 300px;
            background-color: red;
            position: absolute;
            transform: translateZ(150px);
        }
        .box2{
            height: 300px;
            width: 300px;
            background-color: pink;
            position: absolute;
            transform: translateY(150px) rotateX(90deg);
        }
        .box:hover{
            /* transform: scaleY(3) rotateX(-90deg); */
            transform:  rotateX(-90deg) scaleY(3);
        }/*从右到左依次执行*/
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
