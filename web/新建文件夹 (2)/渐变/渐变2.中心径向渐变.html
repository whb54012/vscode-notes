<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 300px;
            width: 300px;
            border-radius: 50%;
            background-image: radial-gradient(/*元素和线性渐变基本相似*/
            150px at center center,/*意义为半径，x，y中的中心为圆心|
            半径可以为两条，相当于椭圆*/
            red,
            green
            );
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
