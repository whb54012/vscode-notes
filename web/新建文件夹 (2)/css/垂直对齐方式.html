<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 img{
            height: 30px;
            width: 30px;
        }/*图一为默认基线对齐方式*/
        .box2 img{
            height: 30px;
            width: 30px;
        }
        .box2 img{
            vertical-align: middle;
        }/*图二为顶端对齐模式*/
        .box3{
            border: 1px solid black;
        }
        .box3 img{
            height: 30px;
            width: 34px;
        }
    </style>
</head>
<body>
    <div class="box1"><img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
    <span>nihao</span>
    </div>
    <div class="box2">
        <img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
        <span>nihao</span>
    </div>
    <div class="box3"><img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
    </div>
</body>
</html><!--行内元素和行元素与其他元素在一起时会把前两者当文字处理会在基线下面产生底线
，导致显示效果为会下空一格一行，导致效果不美观-->
