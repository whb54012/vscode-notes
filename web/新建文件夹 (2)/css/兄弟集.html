<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .b{
            height: 300px;
            width: 800px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 0 auto;
        }
        .box{
            height: 140px;
            width: 250px;
            background-color: pink;
            transition: all 1s ;
        }
        .box:hover ~ .box{
            height: 50px;
            width: 50px;
        }
        .box:hover{
            height: 250px;
            width: 500px;
        }
    </style>
</head>
<body>
    <div class="b">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
