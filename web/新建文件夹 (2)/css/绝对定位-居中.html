<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            position:absolute;
            height: 100px;
            width: 100px;
            left: 50%;
            top: 50%;/*将位置调整到离顶部和左边百分之五十，即十字坐标轴左下角
            靠近原点的地方*/
            margin-left: -50px;
            margin-top: -50px; /*可用外边框缩减大小的一半进行居中*/
            transform: translate(-50%,-50%);/*也可用移动当前图片大小的百分比进行调整*/
        }
    </style>
</head>
<body>
    <img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
</body>
</html>
