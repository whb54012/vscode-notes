<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div::before{
            content: "老鼠";
            display: inline-block;
            height: 50px;
            background-color: red;
        }/*伪元素不属于后代元素，而是和创造他的元素为宿主关系，所以对其
        设置hover时hover后面不加空格*/
        div::after{
            content: "大米";
            height: 50px;
            background-color: red;
        }/*虚拟元素默认为行级*/
    </style>
</head>
<body><!--老鼠爱大米-->
   <div>爱</div> <!--前后添加虚拟元素-->
</body>
</html>
