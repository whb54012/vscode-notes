<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div > p{
            color: red;
            background-image: url(c:\\Users\\whb\\Pictures\\OIP-C.jpg);
        }
        h1,h2,h3{
            color: aqua;}/*并集选择器*/
        p.box{
            color: antiquewhite;
        }
       div.box{
        height: 500px;
        width: 500px;
        /* 铺张 */
          background-image: url(c:\\Users\\whb\\Pictures\\OIP-C.jpg);/*默认平铺*/
          /* background-repeat: repeat; */
          background-repeat: no-repeat;/*不平铺*/
          /* background-repeat: repeat-x;x轴平铺 */
          /* background-repeat: repeat-y; */
          /* 调整背景位置
          （英文关键字或数字坐标或两者一起使用)*/
           background-position: -100px 0;/*xy轴决定位置 */
          /* background-position: right bottom;也可用英文在水平垂直方向上决定位置 */
          /* background-position : 50px center;也可用坐标加英文进行位置改变 */
          /* 缩放
          英文关键字或数字+px写法 */
          /* background-size: contain;/*等比列完全插入，可能会有空白 */
          background-size: cover;/*等比列完全覆盖，可能会有部分图片在背景外无法观察*/
          background-attachment: fixed;/*背景固定,定位基准改为body*/
       }
       .div1{
        /*格式转换*/
        display: block;/*转换成块级，独占一行*/
        /* display: inline-block;行内块 ，可设置宽高但不会都占一行*/
        /* display: inline;行块，不可设置宽高*/
        background-color: green;
       }
    </style>
</head>
    <div>
        <span><p>儿子</p></span>
        <p><span>孙子</span></p>
    </div><!--复合选择器只要里面包括了选择的元素，则元素就会受作用，
如果是div>span父子选择器类似形式，就只能按照div到span的顺序进行影响，中间
如有其他元素格挡则不会受其影响-->
<h1>1</h1>
<h2>2</h2>
<h3>3</h3><!--并集选择器可以使多个属性一起作用-->
<p class="box">交集</p>
<h4 class="box">交集</h4><!--选择器的属性值相同时，可以在属性.前面
加上标签来进行单独作用-->
<div class="box">图片</div><!--图片插入，默认方式是平铺-->
<h5>复合属性</h5><!--背景色，背景图，平铺方式，位置/缩放-->
<div class="div1">格式转换</div>
</body>
</html>
<!--outline: none配合border；0；消除input的边框-->
<!--文字行内和行元素配合其他元素是因为基线对齐和底线原因会导致文字向下对齐基线
而下移一格-->
