<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;;
            padding: 0;
        }
        .box{
            width: 800px;
            height: 500px;
            background-color: pink;
            margin: 50px auto;
        }
        .one{
            height: 500px;
            width: 300px;
            background-color: red;
            margin-right: 10px;
            float: left;
        }
        .two{
            height: 500px;
            width: 490px;
            float: left;
            background-color: blue;
        }
        li{ 
            list-style: none;
            width: 150px;
            height: 240px;
            background-color: yellow;
            float: left;
            margin-bottom: 10px;
            margin-right: 15px;
        }
        li:nth-child(3n){
            margin-right: 0px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="one"></div>
        <div class="two">
            <ul>
                <li>111</li>
                <li>222</li>
                <li>333</li>
                <li>444</li>
                <li>555</li>
                <li>666</li>
            </ul>
        </div>
</body>
</html>
