<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    /* 轮播容器：隐藏溢出 + 固定尺寸 */
    .carousel {
      width: 600px;
      height: 300px;
      margin: 50px auto;
      overflow: hidden;
      position: relative;
    }
    /* 图片列表：横向排列 + 动画平移 */
    .carousel-list {
      display: flex;
      width: 400%; /* 4张图 → 宽度400% */
      height: 100%;
      /* 核心动画：20秒完成一轮，匀速、无限循环 */
      animation: carousel 20s linear infinite;
    }
    /* 单张图片：占1/4宽度（400% ÷ 4 = 100%） */
    .carousel-item {
      width: 100%;
      height: 100%;
    }
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* 动画关键帧：控制平移距离 */
    @keyframes carousel {
      0% { transform: translateX(0); }       /* 第1张 */
      20% { transform: translateX(0); }     /* 停留20%时长 */
      25% { transform: translateX(-100%); } /* 切换到第2张 */
      45% { transform: translateX(-100%); } /* 停留 */
      50% { transform: translateX(-200%); } /* 切换到第3张 */
      70% { transform: translateX(-200%); } /* 停留 */
      75% { transform: translateX(-300%); } /* 切换到第4张 */
      95% { transform: translateX(-300%); } /* 停留 */
      100% { transform: translateX(0); }    /* 回到第1张 */
    }
    /* 鼠标悬停暂停动画（可选优化） */
    .carousel:hover .carousel-list {
      animation-play-state: paused;
    }
  </style>
</head>
<body>
  <div class="carousel">
    <div class="carousel-list">
      <div class="carousel-item"><img src="https://picsum.photos/600/300?random=1" alt="图1"></div>
      <div class="carousel-item"><img src="https://picsum.photos/600/300?random=2" alt="图2"></div>
      <div class="carousel-item"><img src="https://picsum.photos/600/300?random=3" alt="图3"></div>
      <div class="carousel-item"><img src="https://picsum.photos/600/300?random=4" alt="图4"></div>
    </div>
  </div>
</body>
</html>
