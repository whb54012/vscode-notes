<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .A{
            display: flex;
        }
        .a{
            height: 300px;
            width: 300px;
            background-color:yellow;
        }
        .box{
            height: 300px;
            width: 1200px;
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 128, 0, 0.861);
        }
        .box1,.box2,.box3{
            height: 300px;
            width: 300px;
            background-color: rgba(255, 0, 0, 0.998);
        }
        .box1{
            position: relative;
        }
        .box4{
            position: absolute;
            height: 300px;
            width: 1200px;
            background-color: #ffc0cb;
            z-index:-2;
            left: -100px;
        }
    </style>
</head>
<body><div class="A">
    <div class="a"></div>
    <div class="box">
        <div class="box1">1
            <div class="box4"></div>
        </div>
        <div class="box2">2</div>
        <div class="box3">3</div>
       </div>
    </div>
</body>
</html>
