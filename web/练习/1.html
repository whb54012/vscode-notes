<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #t,#tt{
            height: 100px;
            width: 100px;
            background-color: pink;
            opacity: 1;
            transition: all 0.5s;
        }
        #tt{
            position:absolute;
        }
        #t:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="t"><div id="t"></div></div>
    <div id="tt"></div>
</body>
<script>
    const t1 = document.getElementById('t');
    const t2 = document.getElementById('tt');
    t1.addEventListener('mouseenter',() =>{
        t2.style.opacity=0;
    });
    t1.addEventListener('mouseleave',() =>{
        t2.style.opacity=1;
    });
</script>
</html>
