<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image:url("C:\\Users\\whb\\Desktop\\CF963B2405EDC130E5DC0D0946F75D7D.jpg") ;
            background-repeat: repeat;
            background-size: cover;
            /* border: 5px solid #ccc; */
            background-attachment: fixed;
        }
        h1{
            height: 100px;
            line-height: 100px;
            text-align: center;
        }
        div{
            background-size: contain;
        }

        }

<body>
    <form action="">
    <div><h1><a href="./2025-08-08_16.13.32.png" target="_blank" style="text-decoration: none;">注册信息</a></h1></div>
    <h2>个人信息</h2>
    <span>姓名</span>
    <input style="background-color: violet;" type="text" placeholder="请输入姓名"><br><br>
    <span>密码</span>
    <input style="background-color: turquoise;" type="password" placeholder="请输入密码"><br><br>
    <span>确认密码</span>
    <input style="color: aqua;" type="password" placeholder="请再次输入密码"><br><br>
    <span>性别</span>
    <label><input name="11" type="radio" checked>男</label>
    <label><input name="11" type="radio">女</label><br><br>
    <span>居住城市</span>
    <select>
        <option selected>重庆</option>
        <option>成都</option>
        <option>武汉</option>
        <option>北京</option>
    </select></div><hr>
    <h2 style="text-align: center;">教育经历</h2>
    <span>最高学历</span>
    <select>
        <option>小学</option>
        <option>初中</option>
        <option>高中</option>
        <option>大学</option>
    </select><br><br>
    <span>学校</span><input type="text" placeholder="请输入学校名称"><br><br>
    <span>专业</span><input type="text" placeholder="请输入专业名称"><br><br>
    <span>在校时间</span>
    <select>
        <option selected>2021</option>
        <option>2022</option>
        <option>2023</option>
        <option>2024</option>
        <option>2025</option>
    </select>
    <span>--</span>
    <select>
        <option selected>2026</option>
        <option>2027</option>
        <option>2028</option>
        <option>2029</option>
    </select><hr>
    <h2 style="text-align: center;">工作经历</h2>
    <span>公司名称：</span>
    <input type="text"><br><br>
    <span>工作描述</span>
    <textarea name="" id="" placeholder="请简要描述"></textarea><br><br>
    <input style="background-color: aliceblue;" type="radio">请阅读并同意<a href="#">协议一</a>和<a href="#">协议二</a>
    <ul>
        <li><a href="#">用户协议一</a></li>
        <li><a href="#">用户协议二</a></li>
    </ul>
    <button type="button">同意</button>
    <button type="reset">重置</button></form>

</html>
