<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            background-color: orange;
            height: 100px;
            width: 100px;
            float: left;
        }/*浮动元素具有靠顶部，行内块格式，脱离标准流的特点*/
        .two{
            background-color: red;
            width: 200px;
            height: 200px;
        }/*块级元素会忽略浮动元素，而行内元素和行块级元素不会忽略
        所以会表现出块级元素容在一起而文字被排挤出来*/
    </style>
</head>
<body>
    <div class="one">one</div>
    <div class="two">two</div>
</body>
</html>
