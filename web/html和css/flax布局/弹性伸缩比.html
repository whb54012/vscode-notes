<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            display: flex;
            height: 100px;
            width: 300px;
            border: 1px solid black;
            flex-direction: column;/*改变轴体默认方向*/
        }
        .box div{
            background-color: pink;
        }
        .box div:nth-child(1){
            width: 50px;
        }
        .box div:nth-child(2){
            flex: 1;
        }
        .box div:nth-child(3){
            flex: 2;
        }/*flex1和flex2表示为将弹性盒子剩余部分分为1+2，并分别占据一份和两份*/
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
