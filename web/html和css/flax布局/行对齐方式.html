<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 100px;
            border: 1px solid black;
            display: flex;
            flex-wrap: wrap;
            align-content: center;/*多行居中靠齐排列*/
            align-content:flex-start; /*多行靠上对齐，行间无间距*/
            align-content:space-around;  /*使上下靠近边距的盒子间隔相等*/
        }/*和align-items的区别为行对齐控制多行而侧轴对齐方法控制单行*/
        .box div{
            height: 20px;
            width: 60px;
            background-color: red;
        }
        /*行对齐align-conten只有在多行的模式下才生效，也就是对单行无效*/
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
</body>
</html>
