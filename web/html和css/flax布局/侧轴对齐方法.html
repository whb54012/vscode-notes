------------------------侧轴对齐方法
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{display: flex;/*align-items作用于整个容量,全部弹性盒子*/
            width: 300px;
            height: 100px;
            border: 1px solid black;
            align-items: stretch;/*垂直拉伸铺满容器，对内部盒子
            不进行高度设置的时候默认效果一样*/
            align-items: center;/*从垂直方向的中心开始排列*/
            align-items: flex-start;/*垂直方向起点开始排列*/
            align-items: flex-end;/*垂直方向终点排列*/
           
        }
        .box1 div:nth-child(2){
            align-self: center;
        }/*align-self对单个弹性盒子起效果，属性值与上面一样*/
        .box1 div{
            width: 50px;
            height: 50px;
            background-color: red;
            
        }
    </style>
</head>
<body>
    <div class="box1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>3</div>
        <div>3</div>
        <div>3</div>
    </div>
</body>
</html>
