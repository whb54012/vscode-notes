<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         @media(max-width:1707.330px){
            body{background-color: yellow;}
            html{font-size: 170px;}
         }/*条件可以取最大最小值范围*/
         @media(width:1707.330px){
            body{background-color: pink;}
            html{font-size: 170px;}/*通过视口查询将字号设置为宽度的十分之一*/
         }/* @media(条件){选择器{css属性;} */
         div{
            height: 3rem;
            width: 5rem;
            background-color: red;
         }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
