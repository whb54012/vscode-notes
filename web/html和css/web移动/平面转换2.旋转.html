<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
        }
        .box1{
            height: 100px;
            width: 100px;
            background-color: pink ;
            transition: all 1s;
        }
        .box1:hover{
            transform: rotate(360deg);
            /*旋转角度为多少就写多少，正负决定旋转角度*/
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
    </div>
</body>
</html>
