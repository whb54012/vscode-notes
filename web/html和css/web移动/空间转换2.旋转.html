<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            /* perspective:1000px; */
            width: 500px;
            margin: 100px auto;
        }
        .box1,.box2,.box3{
            height: 300px;
            width: 300px;
            background-color: pink;
            transition: all 1s;
            background-image: url(../新建文件夹/2025-08-08_16.13.32.png);
        }
        .box:hover .box1{
            transform: rotateZ(90deg);/*旋转不用添加视距,代表沿着z轴旋转的*/
        }
        .box2:hover{
            transform: rotateX(60deg);/*沿着x轴旋转*/
        }
        .box3:hover{
            transform: rotateY(45deg);/*左手定则，大拇指指向正轴，手背在正面握住旋转轴，四指为正旋转方向*/
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>
</body>
</html>
