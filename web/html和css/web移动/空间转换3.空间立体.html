<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 300px;
            background-color: pink;
            transition: all 2s;
            /* transform-style: preserve-3d;/*想要进行空间立体就必须在父级添加
            此属性，否则对z轴进行位移将无效果*/ 
            position: relative;
        }
        .box1{
            height: 300px;
            width: 300px;
            background-color: yellow;
            transform: translateZ(100px);
            position: absolute;
        }
        .box2{
            width: 300px;
            height: 300px;
            background-color: red;
            transform: translateZ(-100px);
            position: absolute;
        }
        .box3{
            height: 300px;
            width: 300px;
            background-color: green;
            transform: rotateX(90deg);
            position: absolute;
            top: -150px;
        }
        .box:hover{
            transform: rotateX(90deg);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>
</body>
</html>
