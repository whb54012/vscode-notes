<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 300px;
            width: 1200px;
        }
        .box1{
             background-image: url(../新建文件夹/2025-08-08_16.13.32.png);
            border-radius: 50%;
            height: 300px;
            width: 300px;
            transition: all 1s;
        }
        .box2{
            background-color: pink;
            border-radius: 50%;
            height: 300px;
            width: 300px;
            transition: all 1s;
            transform: rotate(0deg) translate(300px,0);
        }
        .box:hover .box1{
            transform: translate(300px,0) rotate(270deg);
            /*依次执行，先旋转后移动*/
        }
        .box:hover .box2{
            transform: rotate(360deg) translate(300px,0);
            /*移动在前就是在移动中旋转，旋转在前就是旋转中移动*/
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
    </div>
        <div class="box">
        <div class="box2"></div>
    </div>
</body>
</html><!--transition属性出现多个时应使用复合模式，使用单个模式只有最后一个生效-->
