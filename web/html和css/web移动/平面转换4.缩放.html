<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
           height: 300px;
           width: 300px;
           overflow: hidden; 
        }
        .box1{
            height: 300px;
            width: 300px;
            background-image: url(../新建文件夹/2025-08-08_16.13.32.png);
            transition: all 1s;
            background-size: cover;
        }
        .box:hover .box1{
            transform: scale(2,2);/*括号内部可写一个值，表示xy轴等比列缩放
            并且当父级缩放后，其子级所有内容也会同步缩放，不论是否设置宽高*/
            /* 不会改变元素实际大小，只是渲染 */
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1"></div>
    </div>
</body>
</html>
