<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .b{
            display: flex;
            height: 200px;
            flex-wrap: wrap;
            width: 200px;
        }
        .box{
            height: 100px;
            width: 100px;
            background-color: red;
            transition: all 0.1s;
        }
        .box:hover{
            height: 200px;
            width: 200px;
        }
        .b:hover .box:not(:hover){
           width: 0px;
           height: 0;
        }/*.box:not(:hover)：选中所有带box类的元素，排除其中带:hover类的*/
        /* 属性类名加:not(排除条件)
        对属性名符合排除条件之外的属性名进行操作 */
    </style>
</head>
<body>
    <div class="b">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">2</div>
        <div class="box">2</div>
    </div>
</body>
</html>
