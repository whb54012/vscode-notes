<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div video{
            object-fit: cover;/*cover:保持比列铺满容器*/
            /*contain：保持比列完整显示，容器可能留空白*/
            /*fill：拉伸变形，强制填满容器*/
        }/*适用于图片，视频之类的填充和自适应，在将其设置为背景而不用background的形式是使用
        视频必须使用这种方法,图片可用背景也可用此方法*/
    </style>
</head>
<body>
    <div>
        <video src="../Forza Horizon 5 2025.09.30 - 11.30.50.01.mp4"></video>
    </div>
</body>
