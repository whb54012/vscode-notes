<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .l{
            height: 300px;
            width: 200px;
            background-color: red;
            float: left;
        }
        .r{
            height: 300px;
            width: 900px;
            background-color: green;
            float: right;
        }
        .box{
            /* height: 300px; *//*浮动元素，无法撑开父级盒子，导致父级盒子没有高度被隐藏*/
            width: 1200px;
            background-color: pink;
        }
        .clear{
            clear: both;/*内容尾部添加一块级元素，清除浮动影响，使其能够撑开父级盒子*/
        }
        .box::after{
            content: "";
            display:block;
            clear: both;
        }/*方法二单伪元素法*/
        .box{
            overflow: hidden;
        }/*方法三为父级添加overflow属性*/
    </style>
</head>
<body>
    <div class="box">
    <div class="l"></div>
    <div class="r"></div>
    <div class="clear"></div><!--方法一额外标签法 -->
    </div>
</body>
</html>
