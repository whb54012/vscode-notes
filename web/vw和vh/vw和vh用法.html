<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            width: 5vw;
            height: 3vw;
            background-color: red;
        }/*vw全称为viewport width视口宽度，大小为视口宽度百分之一*/
        .b{
            width: 50vh;
            height: 30vh;
            background-color: pink;
        }/*vh全称为viewport height，大小为视口高度的百分之一*/
    </style><!--两者皆可以与移动端适配，不建议混用两者，容易使盒子变形-->
</head>
<body>
    <div class="a"></div>
    <div class="b"></div>
</body>
</html>
