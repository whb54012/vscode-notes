steps()
分布执行就是逐帧动画
有几张图片填几个分步
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    /* 逐帧动画核心容器 */
    .frame-anime {
      width: 100px;
      height: 100px;
      margin: 50px auto;
      font-size: 40px;
      text-align: center;
      line-height: 100px;
      background: #4299e1;
      color: #fff;
      /* 逐帧动画核心：steps(4) 表示分成4帧，无过渡 */
      animation: frame 4s steps(4) infinite;
    }

    /* 定义4个关键帧（逐帧切换内容/样式） */
    @keyframes frame {
      0% { content: "1"; background: #4299e1; }   /* 第1帧 */
      25% { content: "2"; background: #9f7aea; }  /* 第2帧 */
      50% { content: "3"; background: #38b2ac; }  /* 第3帧 */
      75% { content: "4"; background: #ed8936; }  /* 第4帧 */
    }
  </style>
</head>
<body>
  <div class="frame-anime"></div>
</body>
</html>
