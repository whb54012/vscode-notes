<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title><style>
        .body{
        height: 16000px;
        }
        .box{
            height: 600px;
            width: 1200px;
        }
        .first{
            height: 300px;
            width: 1200px;
            position: sticky;/*离他最近的一个有滚动条的祖宗容器为定位范围*/
            top:0px;/*到达多少后开始粘连*/
            background-color: pink;
        }/*粘性定位，当设置的元素到达指定位置后将粘连在此处，直到他的父级元素
        带着它滚动出此页面*/
        .firs{
            height: 300px;
            width: 1200px;
            background-color: pink;
        }
        .b{
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="b"></div>
        <div class="first">A</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
        <div class="firs">A</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
        <div class="firs">A</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
</body>
</html>
