<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            position: relative;
            display: inline-block;
            height: 300px;
            width: 300px;
            border: 1px solid black;
        }
        .box1,.box2{
            position: absolute;
        }
        .box1{
            width: 100px;
            height: 100px;
            background-color: blue;
            z-index: 2;
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: pink;
            left: 20px;
            top: 20px;
            z-index: 0;
        }/*堆叠层级z-index越大，就越居上，没有此属性就后来者居上*/
        .box3{
            display: inline-block;
            height: 300px;
            width: 300px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="box">
    <div class="box1"></div>
    <div class="box2"></div>
    </div>
    <div class="box3"></div>
</body>
</html>
