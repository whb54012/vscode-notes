<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 30px;
            width: 30px;
            transition: all 2s;
        }/*过渡属性生效前提是过渡前后都必须有此属性才可动画过渡(像web移动这类有默认属性值的除外)，列如
        如果盒子原来没有添加背景色属性在hover里为他添加背景色时，此时过渡无用*/
        img:hover{ 
            height: 50px;
            width: 50px;
        }/*过渡效果产生动画*/
    </style>
</head>
<body>
    <img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
</body>
</html>
