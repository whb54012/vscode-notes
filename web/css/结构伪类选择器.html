<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{/*第一位元素选择*/
            background-color: green;
        }
        li:last-child{/*最后一位元素*/
            background-color: red;
        }
        li:nth-child(3){/*指定位置选择*/
            background-color: yellow;
        }
        li:nth-child(5n){/*公式标签选择，n从0开始，5n表示5的倍数，n+5表示第五个以后的数*/
            background-color: aqua;
        }
        li:nth-child(-n+5){/*-n+5表示五之前的标签 */
            color: blueviolet;
        }
    </style>
</head>
<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li><!--结构伪类选择器-->
        <li>6</li>
        <li>7</li>
        <li>8</li>
        <li>9</li>
        <li>10</li>
        <li>11</li>
    </ul>
</body>
</html>
