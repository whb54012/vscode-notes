<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            height: 100px;
            width: 200px;
        }
        .box{
            position: relative;/*如果没有这个相对定位属性，后面的子级绝对定位属性会以整个
            网页为定位参照*/
        }
        .box .b{
            position: absolute;
            height: 20px;
            background-color: #dc121252;
            top: 0;
            left: 0;/*绝对定位*/
        }/*绝对定位特性:1脱标不占位,2绝对位置定位不以原位置为参照，而以当前
        所在的最近相对定位属性的父级或更高级位面为定位参照
        3,绝对定位后盒子具有行内块级元素属性*/
    </style>
</head>
<body>
    <div class="box">
        <img src="../新建文件夹/2025-08-08_16.13.32.png" alt="">
        <span class="b">nh</span>
        <div>我好</div>
    </div>
</body>
</html><!--父相对子绝对-->
