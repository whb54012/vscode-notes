<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" onclick="alert('欢迎')">点我</button>
    <!-- type="button"将按钮定义为纯点击按钮，不定义会默认提交按钮 -->
     <!-- onclick="alert('内容')"为弹窗，点击按钮会跳出包含内容的弹窗
      常与button搭配使用，调用onclick指向的部分 -->
      <!-- alert()内部单,双引号都能正常使用，但由于外部有onlick指向，用
双引号会让onclick以为指向内部，所以用单引号 -->
       <script>
        alert("你好");//弹窗功能，可通过直接执行显示，也可如上面一样使用
       </script>
</body>
</html>
