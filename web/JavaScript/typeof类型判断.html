<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let age=18;
        let love="rap";
        let t=2>0;
        let tt=true;//结果为布尔值(boolean)
        let kong;
        let arr=["apple","banana"];
        typeof age;
        typeof(age);//两种写法
        document.write(typeof age);
        document.write("<br>");
        document.write(typeof(age));
        document.write("<br>");//不为JavaScript内部的语法要加引号
        document.write(typeof love);
        document.write("<br>");
        document.write(typeof t);
        document.write("<br>");
        document.write(typeof kong);
        document.write("<br>");
        document.write(typeof arr);//数组会被定义为输出为object
//通过英文来告诉为和类型number:数值,string:字符串,boolean:判断值(true or false),undefined:无赋值
//JavaScript不区分浮点数和整数
    </script>
</body>
</html>
