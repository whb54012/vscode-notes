<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a=1;
        var b=1;
        var c="1";
        var d="2";
        document.write(a==b);
        document.write(a==c);//双等号时比较内容，无需在意类型
        document.write(a===c);//三等号时会比较类型和内容两者
         document.write(a!==c);//不全等或不全等
    </script>
</body>
</html>
