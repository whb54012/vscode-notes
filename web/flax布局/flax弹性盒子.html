<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 200px;
            width: 300px;
            border: 1px solid black;
            display: flex;/*弹性盒子沿着主轴去排列*/
        }
        .b1{
            height: 50px;
            width: 50px;
            background-color: red;
        }/*flex布局为弹性盒子，会自动压缩和伸展，在子级不设置宽高情况下会自动
        填满父级，元素过多时也会自动降低宽高挤在一起*/
    </style>
</head>
<body>
    <div class="box">
        <div class="b1">1</div>
        <div class="b1">2</div>
        <div class="b1">3</div>
        <div class="b1">1</div>
        <div class="b1">2</div>
        <div class="b1">3</div>
        <div class="b1">1</div>
        <div class="b1">2</div>
        <div class="b1">3</div>
    </div>
</body>
</html>
