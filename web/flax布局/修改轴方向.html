<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            display: flex;
            height: 200px;
            width: 300px;
            border: 1px solid black;
            justify-content: center;/*与space的属性相互矛盾，两者出现则后面
            一个生效*/
            justify-content: space-evenly;
            flex-direction: column;/*改变主轴方向填充，侧轴方向变为水平*/
            align-items: center;
        }
        .box div{
            height: 50px;
            width: 80px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <!-- <div>3</div> -->
    </div>
</body>
</html>
